<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TechShop Assistant</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .chat-container {
      width: 420px;
      height: 640px;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.12);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-header {
      background: #1a1a2e;
      color: #fff;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #e94560;
      display: flex;
      align-items: center;
      justify-content: font-bold;
      font-weight: 700;
      font-size: 18px;
      color: #fff;
      justify-content: center;
    }

    .header-info h2 { font-size: 15px; font-weight: 600; }
    .header-info span { font-size: 12px; opacity: 0.7; }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      max-width: 80%;
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.5;
      word-break: break-word;
    }

    .message.user {
      align-self: flex-end;
      background: #1a1a2e;
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .message.assistant {
      align-self: flex-start;
      background: #f0f2f5;
      color: #1a1a2e;
      border-bottom-left-radius: 4px;
    }

    .message.error {
      align-self: flex-start;
      background: #fff0f0;
      color: #cc0000;
      border: 1px solid #ffcccc;
    }

    .typing {
      align-self: flex-start;
      background: #f0f2f5;
      border-radius: 16px;
      border-bottom-left-radius: 4px;
      padding: 12px 16px;
      display: none;
    }

    .typing span {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #999;
      margin: 0 2px;
      animation: bounce 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    .input-area {
      padding: 14px 16px;
      border-top: 1px solid #eee;
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .input-area input {
      flex: 1;
      padding: 10px 14px;
      border: 1.5px solid #e0e0e0;
      border-radius: 24px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-area input:focus { border-color: #1a1a2e; }

    .send-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #1a1a2e;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
      flex-shrink: 0;
    }

    .send-btn:hover { background: #e94560; }
    .send-btn:disabled { background: #ccc; cursor: not-allowed; }

    .send-btn svg { width: 18px; height: 18px; fill: #fff; }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">
      <div class="avatar">T</div>
      <div class="header-info">
        <h2>TechShop Assistant</h2>
        <span>Alex · Soporte al cliente</span>
      </div>
    </div>

    <div class="messages" id="messages">
      <div class="message assistant">
        ¡Hola! Soy Alex, tu asistente de TechShop. ¿En qué puedo ayudarte hoy?
      </div>
    </div>

    <div class="typing" id="typing">
      <span></span><span></span><span></span>
    </div>

    <div class="input-area">
      <input
        type="text"
        id="input"
        placeholder="Escribí tu mensaje..."
        autocomplete="off"
      />
      <button class="send-btn" id="send-btn">
        <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
      </button>
    </div>
  </div>

  <script>
    const USER_ID = "user_" + Math.random().toString(36).slice(2, 8);
    const messagesEl = document.getElementById("messages");
    const inputEl = document.getElementById("input");
    const sendBtn = document.getElementById("send-btn");
    const typingEl = document.getElementById("typing");

    function addMessage(text, role) {
      const div = document.createElement("div");
      div.className = "message " + role;
      div.textContent = text;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text) return;

      inputEl.value = "";
      sendBtn.disabled = true;
      addMessage(text, "user");

      typingEl.style.display = "block";
      messagesEl.scrollTop = messagesEl.scrollHeight;

      try {
        const res = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ user_id: USER_ID, message: text }),
        });

        const data = await res.json();

        if (!res.ok) {
          addMessage("Error: " + (data.detail || "algo salió mal"), "error");
        } else {
          addMessage(data.response, "assistant");
        }
      } catch {
        addMessage("No se pudo conectar con el servidor.", "error");
      } finally {
        typingEl.style.display = "none";
        sendBtn.disabled = false;
        inputEl.focus();
      }
    }

    sendBtn.addEventListener("click", sendMessage);
    inputEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) sendMessage();
    });
  </script>
</body>
</html>
